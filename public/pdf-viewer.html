<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libera — PDF Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0d0b;
      color: #f0ead8;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #161410;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
      gap: 16px;
    }

    #title {
      font-size: 13px;
      color: #f0ead8;
      font-family: Georgia, serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 500px;
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    #page-info {
      font-size: 11px;
      color: #3a3628;
      font-family: monospace;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #7a7060;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 2px 4px;
      transition: color 0.15s;
      display: flex;
      align-items: center;
    }
    .ctrl-btn:hover { color: #c8bfa8; }

    #zoom-label {
      font-size: 11px;
      color: #7a7060;
      width: 40px;
      text-align: center;
    }

    #viewer-container {
      flex: 1;
      overflow-y: auto;
      background: #1a1814;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .page-wrapper {
      position: relative;
      box-shadow: 0 4px 32px rgba(0,0,0,0.6);
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
      transition: box-shadow 0.15s;
    }

    .page-inner {
      transform-origin: top left;
      transition: transform 0.1s ease-out;
      position: relative;
    }

    canvas {
      display: block;
      position: relative;
      z-index: 1;
    }

.textLayer {
  position: absolute;
  top: 0;
  left: 0;
  overflow: visible;
  line-height: 1;
  pointer-events: auto;
  z-index: 2;
}

    .textLayer span {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
    }

    .textLayer span::selection {
      background: rgba(212, 135, 42, 0.4);
      color: transparent;
    }

.textLayer .highlight {
  background-color: rgba(212, 135, 42, 0.45) !important;
  border-radius: 2px;
  outline: 2px solid rgba(212, 135, 42, 0.8);
}
    .textLayer .highlight.selected {
      background-color: rgba(212, 135, 42, 0.75) !important;
    }

    #loading {
      color: #3a3628;
      font-size: 13px;
      margin-top: 40px;
    }

    .rendering-indicator {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(22, 20, 16, 0.9);
      border: 1px solid rgba(255,255,255,0.06);
      color: #7a7060;
      font-size: 10px;
      font-family: monospace;
      padding: 6px 12px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .rendering-indicator.visible { opacity: 1; }

    #search-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      background: #161410;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    #search-bar.visible { display: flex; }

    #search-input {
      flex: 1;
      background: #2a2820;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 6px 12px;
      color: #f0ead8;
      font-size: 13px;
      outline: none;
      font-family: Georgia, serif;
      max-width: 360px;
    }
    #search-input:focus { border-color: rgba(212,135,42,0.4); }

    #search-count {
      font-size: 11px;
      color: #3a3628;
      font-family: monospace;
      min-width: 60px;
    }

    .search-nav-btn {
      background: none;
      border: none;
      color: #7a7060;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .search-nav-btn:hover { color: #c8bfa8; }
  </style>
</head>
<body>
  <div id="header">
    <span id="title">Loading...</span>
    <div id="controls">
      <span id="page-info"></span>
      <button class="ctrl-btn" id="search-btn" title="Search (Ctrl+F)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="zoom-out">−</button>
      <span id="zoom-label">120%</span>
      <button class="ctrl-btn" id="zoom-in">+</button>
    </div>
  </div>

  <div id="search-bar">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="#7a7060">
      <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
    </svg>
    <input id="search-input" type="text" placeholder="Search in document..." autocomplete="off" />
    <span id="search-count"></span>
    <button class="search-nav-btn" id="search-prev">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <button class="search-nav-btn" id="search-next">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
    </button>
    <button class="search-nav-btn" id="search-close">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>

  <div id="viewer-container"></div>
  <div class="rendering-indicator" id="rendering-indicator">Rendering...</div>

  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

    const params = new URLSearchParams(window.location.search);
    const filePath = params.get('path');
    const fileTitle = params.get('title');

    if (fileTitle) document.getElementById('title').textContent = decodeURIComponent(fileTitle);

    let pdf = null;
    let scale = 1.2;
    let renderScale = 1.2;
    let currentPage = 1;
    let renderTimeout = null;
    let isRendering = false;

    let searchResults = [];
    let searchIndex = 0;
    let searchTimeout = null;

    const container = document.getElementById('viewer-container');
    const pageInfo = document.getElementById('page-info');
    const zoomLabel = document.getElementById('zoom-label');
    const indicator = document.getElementById('rendering-indicator');
    const searchBar = document.getElementById('search-bar');
    const searchInput = document.getElementById('search-input');
    const searchCount = document.getElementById('search-count');

    async function loadPdf(url) {
      pdf = await pdfjsLib.getDocument(url).promise;
      await renderAll(scale);
    }

    async function renderAll(targetScale) {
      if (isRendering) return;
      isRendering = true;
      indicator.classList.add('visible');

      container.innerHTML = '';
      renderScale = targetScale;

      const pages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: targetScale });

        const wrapper = document.createElement('div');
        wrapper.className = 'page-wrapper';
        wrapper.id = `page-${i}`;
        wrapper.style.width = viewport.width + 'px';
        wrapper.style.height = viewport.height + 'px';

        const inner = document.createElement('div');
        inner.className = 'page-inner';
        inner.style.width = viewport.width + 'px';
        inner.style.height = viewport.height + 'px';

        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;

        const textDiv = document.createElement('div');
        textDiv.className = 'textLayer';
        textDiv.style.width = viewport.width + 'px';
        textDiv.style.height = viewport.height + 'px';

        inner.appendChild(canvas);
        inner.appendChild(textDiv);
        wrapper.appendChild(inner);
        container.appendChild(wrapper);
        pages.push({ page, canvas, viewport, textDiv });
      }

      for (let i = 0; i < pages.length; i++) {
        const { page, canvas, viewport, textDiv } = pages[i];
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;
        try {
          const textContent = await page.getTextContent();
          textDiv.innerHTML = '';
          await pdfjsLib.renderTextLayer({
            textContentSource: textContent,
            container: textDiv,
            viewport,
          }).promise;
        } catch(e) {}
      }

      updatePageInfo();
      isRendering = false;
      indicator.classList.remove('visible');

      if (searchInput.value.trim()) {
        await performSearch(searchInput.value, false);
      }
    }

    async function performSearch(query, resetIndex = true) {
      document.querySelectorAll('.textLayer .highlight').forEach(el => {
        el.classList.remove('highlight', 'selected');
      });
      searchResults = [];

      if (!query.trim() || !pdf) {
        searchCount.textContent = '';
        return;
      }

      const q = query.toLowerCase().replace(/\s+/g, '');

      for (let i = 1; i <= pdf.numPages; i++) {
        const textDiv = document.querySelector(`#page-${i} .textLayer`);
        if (!textDiv) continue;

        const spans = textDiv.querySelectorAll('span');
        spans.forEach(span => {
          const normalized = span.textContent.replace(/\s+/g, '').toLowerCase();
          if (normalized.includes(q)) {
            span.classList.add('highlight');
            searchResults.push({ page: i, el: span });
          }
        });
      }

      if (resetIndex) searchIndex = 0;

      if (searchResults.length > 0) {
        highlightCurrent();
      } else {
        searchCount.textContent = query ? 'No results' : '';
      }
    }

    function highlightCurrent() {
      document.querySelectorAll('.textLayer .selected').forEach(el => el.classList.remove('selected'));
      if (searchResults.length === 0) return;
      const result = searchResults[searchIndex];
      result.el.classList.add('selected');
      result.el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      searchCount.textContent = `${searchIndex + 1} / ${searchResults.length}`;
    }

    function searchNext() {
      if (!searchResults.length) return;
      searchIndex = (searchIndex + 1) % searchResults.length;
      highlightCurrent();
    }

    function searchPrev() {
      if (!searchResults.length) return;
      searchIndex = (searchIndex - 1 + searchResults.length) % searchResults.length;
      highlightCurrent();
    }

    function openSearch() {
      searchBar.classList.add('visible');
      searchInput.focus();
      searchInput.select();
    }

    function closeSearch() {
      searchBar.classList.remove('visible');
      searchInput.value = '';
      searchResults = [];
      searchCount.textContent = '';
      document.querySelectorAll('.textLayer .highlight').forEach(el => {
        el.classList.remove('highlight', 'selected');
      });
    }

    document.getElementById('search-btn').addEventListener('click', openSearch);
    document.getElementById('search-close').addEventListener('click', closeSearch);
    document.getElementById('search-next').addEventListener('click', searchNext);
    document.getElementById('search-prev').addEventListener('click', searchPrev);

    searchInput.addEventListener('input', () => {
      if (searchTimeout) clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => performSearch(searchInput.value), 300);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.shiftKey ? searchPrev() : searchNext(); }
      if (e.key === 'Escape') closeSearch();
    });

    function applyVisualZoom() {
      const ratio = scale / renderScale;
      const wrappers = container.querySelectorAll('.page-wrapper');
      wrappers.forEach(wrapper => {
        const inner = wrapper.querySelector('.page-inner');
        if (!inner) return;
        inner.style.transform = `scale(${ratio})`;
        const origWidth = parseFloat(inner.style.width);
        const origHeight = parseFloat(inner.style.height);
        wrapper.style.width = (origWidth * ratio) + 'px';
        wrapper.style.height = (origHeight * ratio) + 'px';
      });
      zoomLabel.textContent = Math.round(scale * 100) + '%';
    }

    function scheduleRender() {
      applyVisualZoom();
      if (renderTimeout) clearTimeout(renderTimeout);
      renderTimeout = setTimeout(() => renderAll(scale), 600);
    }

    function updatePageInfo() {
      if (pdf) pageInfo.textContent = `${currentPage} / ${pdf.numPages}`;
      zoomLabel.textContent = Math.round(scale * 100) + '%';
    }

    container.addEventListener('scroll', () => {
      const wrappers = container.querySelectorAll('[id^="page-"]');
      const scrollTop = container.scrollTop + 100;
      wrappers.forEach(el => {
        if (el.offsetTop <= scrollTop) {
          currentPage = parseInt(el.id.replace('page-', ''));
        }
      });
      updatePageInfo();
    }, { passive: true });

    document.getElementById('zoom-in').addEventListener('click', () => {
      scale = Math.min(3, Math.round((scale + 0.1) * 10) / 10);
      scheduleRender();
    });
    document.getElementById('zoom-out').addEventListener('click', () => {
      scale = Math.max(0.5, Math.round((scale - 0.1) * 10) / 10);
      scheduleRender();
    });

    container.addEventListener('wheel', (e) => {
      if (!e.ctrlKey) return;
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.1 : 0.1;
      scale = Math.min(3, Math.max(0.5, Math.round((scale + delta) * 10) / 10));
      scheduleRender();
    }, { passive: false });

    window.addEventListener('keydown', (e) => {
      const inInput = document.activeElement?.tagName === 'INPUT';
      if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
        e.preventDefault();
        openSearch();
        return;
      }
      if (!inInput) {
        if (e.key === '+') { scale = Math.min(3, Math.round((scale + 0.1) * 10) / 10); scheduleRender(); }
        if (e.key === '-') { scale = Math.max(0.5, Math.round((scale - 0.1) * 10) / 10); scheduleRender(); }
      }
      if ((e.ctrlKey || e.metaKey) && e.key === '=') { e.preventDefault(); scale = Math.min(3, Math.round((scale + 0.1) * 10) / 10); scheduleRender(); }
      if ((e.ctrlKey || e.metaKey) && e.key === '-') { e.preventDefault(); scale = Math.max(0.5, Math.round((scale - 0.1) * 10) / 10); scheduleRender(); }
    });

    if (filePath) {
      const decoded = decodeURIComponent(filePath);
      const assetUrl = window.__TAURI_INTERNALS__
        ? window.__TAURI_INTERNALS__.convertFileSrc(decoded)
        : `http://asset.localhost/${encodeURIComponent(decoded)}`;
      loadPdf(assetUrl);
    }
  </script>
</body>
</html>
